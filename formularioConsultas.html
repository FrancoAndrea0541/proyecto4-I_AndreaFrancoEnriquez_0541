<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Alta de Consultas</title>
</head>
<body>

<header>
    <h1>Alta de Consultas-Consultorio Medico Lily</h1>
    <img src="consultoriolily.png" alt="Logo Consultorio Lily" class="logo-consultorio">
    <p>Rellene los datos solicitados para darle de alta en el sistema por favor</p>
</header>
    
<main>
    <div class="form-container">
        <form action="#.html" method="POST">
            
            <div class="form-group">
                <label>Fechas de Visita:</label>
                <input type="date">
            </div>

            <div class="form-group">
                <label>Hora de visita:</label>
                <input type="text">
            </div>

            <div class="form-group">
                <label>Numero de consultorio:</label>
                <input type="text">
            </div>

            <div class="form-group">
                <label>Se Realizo la Consulta:</label>
                <input type="text">
            </div>

            <div class="form-group">
                <label>Motivo de Consulta:</label>
                <input type="text">
            </div>

            <div class="form-group">
                <label>Signos Vitales:</label>
                <input type="text">
            </div>

            <div class="form-group">
                <label>Diagnostico:</label>
                <input type="text">
            </div>

            <div class="form-group">
                <label>Tratamiento/receta:</label>
                <input type="text">
            </div>

            <div class="form-group">
                <label>Recomendaciones:</label>
                <input type="text">
            </div>

            <button type="submit" class="btn-submit">Dar de alta la Consulta</button>
        </form>
    </div>

    <a href="index.html" class="btn-back">Volver al Inicio</a>
</main>

<footer>
    <p>Franco Enríquez Andrea-Programación</p>
    <p>24308051280541-4°I</p>
</footer>

<style>
    * {
        box-sizing: border-box;
    }

    body {
        font-family: "Comic Sans MS", "Comic Sans", sans-serif;
        background-color: #ffffcc; 
        margin: 0;
        padding: 0;
        display: flex;
        flex-direction: column;
        align-items: center;
        min-height: 100vh;
    }

    header {
        background-color: #ff80aa; 
        width: 100%;
        padding: 20px 0;
        text-align: center; 
        box-shadow: 0 2px 5px rgba(0,0,0,0.05);
        position: relative; 
    }

   
    .logo-consultorio {
        max-width: 150px;       
        height: auto;     
        position: absolute;    
        top: 10px;              
        left: 20px;             
    }

    h1 {
        color: #3d2d3a;
        font-family: 'Jua', sans-serif;
        margin: 0;
        font-size: 2rem;
    }

    main {
        display: flex;
        flex-direction: column;
        align-items: center;
        width: 100%;
        padding: 40px 20px;
        flex: 1;
    }

    .form-container {
        max-width: 500px;
        width: 100%;
        background: white;
        padding: 35px;
        border-radius: 12px;
        box-shadow: 0 8px 24px rgba(245, 228, 242, 0.7);
        border-top: 6px solid #e8c5e3;
    }

    .form-group {
        margin-bottom: 22px;
    }
   
    label {
        display: block;
        margin-bottom: 8px;
        font-weight: 600;
        color: #555;
        font-size: 14px;
    }
   
    input[type="text"], input[type="number"], input[type="date"], input[type="tel"] {
        width: 100%;
        padding: 12px;
        border: 1px solid #e0d0dd;
        border-radius: 6px;
        font-family: "Poppins", sans-serif;
        font-size: 14px;
        background-color: #faf7fa;
        color: #333;
        transition: all 0.3s ease;
    }

    input:focus {
        outline: none;
        border-color: #ca9ec3;
        background-color: #fff;
        box-shadow: 0 0 5px rgba(202, 158, 195, 0.4);
    }

    .btn-submit {
        background-color: #ca9ec3;
        color: white;
        border: none;
        padding: 14px 15px;
        width: 100%;
        border-radius: 6px;
        font-size: 16px;
        font-weight: bold;
        cursor: pointer;
        transition: background-color 0.3s ease;
        font-family: "Poppins", sans-serif;
        margin-top: 10px;
    }

    .btn-submit:hover {
        background-color: #b382ab;
    }

    .btn-back {
        display: inline-block;
        text-align: center;
        margin-top: 25px;
        color: #888;
        text-decoration: none;
        font-size: 14px;
        font-weight: 500;
        transition: color 0.3s ease;
    }

    .btn-back:hover {
        color: #b382ab;
    }

    footer {
        width: 100%;
        background-color: #f3edf2;
        padding: 15px 0;
        text-align: center;
        font-size: 13px;
        color: #776a78;
    }

    footer p {
        margin: 4px 0;
        font-family: 'Poppins', sans-serif;
    }
</style>

</body>
</html>
