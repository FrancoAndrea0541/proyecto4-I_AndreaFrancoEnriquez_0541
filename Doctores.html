<!DOCTYPE html>

<style>
* {
  box-sizing: border-box;
}

body {
  font-family: Comic Sans MS, Helvetica, sans-serif;
}

header {
  background-color: #ff80aa;
  padding: 30px;
  text-align: center;
  font-size: 35px;
  color: purple;
}

nav {
  float: left;
  width: 30%;
  height: 500px;
  background: #b3daff;
  padding: 30px;
}

nav ul {
  list-style-type: none;
  padding: 0;
}

article {
  float: left;
  padding: 20px;
  width: 70%;
  background-color: #ffffcc;
  height: 500px; 
}

section::after {
  content: "";
  display: table;
  clear: both;
}

footer {
  background-color: #bb99ff;
  padding: 10px;
  text-align: center;
  color: white;
}

@media (max-width: 600px) {
  nav, article {
    width: 100%;
    height: auto;
  }
}
</style>
